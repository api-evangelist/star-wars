aid: star-wars
name: Star Wars API
description: >
  The Star Wars REST API (SWAPI / swapi.info) is the world's first quantified
  and programmatically-accessible data source for all the data from the Star
  Wars canon universe. It provides structured JSON access to films, characters
  (people), starships, vehicles, planets, and species from the Star Wars
  universe via a simple HTTP GET API. The API requires no authentication, has
  no rate limits, and is completely free and open source. Originally created by
  Paul Hallett as swapi.co and later swapi.dev, the current maintained
  iteration at swapi.info was rebuilt by Sivaram P as a CDN-powered,
  file-based API serving over one million daily requests with sub-50ms global
  response times via Vercel and Cloudflare.
